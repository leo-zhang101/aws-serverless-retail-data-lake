version: 2

models:
  - name: stg_customers
    description: Staging layer for customer dimension
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: email
        tests: [not_null]
      - name: state_normalised
        tests: [not_null]

  - name: stg_orders
    description: Staging layer for order fact
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: order_date
        tests: [not_null]
      - name: total_amount_aud
        tests: [not_null]

  - name: stg_products
    description: Staging layer for product dimension
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: unit_price_aud
        tests: [not_null]

  - name: stg_payments
    description: Staging layer for payment fact
    columns:
      - name: payment_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: amount_aud
        tests: [not_null]

  - name: stg_stores
    description: Staging layer for store dimension
    columns:
      - name: store_id
        tests: [unique, not_null]
      - name: state_normalised
        tests: [not_null]

  - name: stg_promotions
    description: Staging layer for promotion dimension
    columns:
      - name: promotion_id
        tests: [unique, not_null]

  - name: stg_order_items
    description: Staging layer for order line items
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: line_total_aud
        tests: [not_null]
