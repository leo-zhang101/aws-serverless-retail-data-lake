version: 2

models:
  - name: int_order_items
    description: Order line items enriched with product and order context
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: int_orders_enriched
    description: Orders joined with customer, store, and promotion dimensions
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]

  - name: int_customer_orders
    description: Customer-order-payment bridge for aggregation
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
